<div class="module-header">
  <div class="hud-badge">MOD_08_ACTIVE</div>
  <h2>Logistik_Materiale</h2>
  <p>Vægtberegning (Stål/Alu/Plast) og hårdhedskonvertering.</p>
</div>
<div class="hud-grid">
  <div class="hud-panel">
    <div class="panel-title">/// VÆGT_BEREGNER</div>
    <div class="form-row"><div class="input-group"><label>FORM</label><select id="l-s"><option value="cyl">RUNDSTÅL</option><option value="blk">PLADE</option></select></div><div class="input-group"><label>MATERIALE</label><select id="l-m"><option value="7.85">STÅL</option><option value="2.7">ALU</option><option value="1.41">DELRIN</option><option value="1.14">NYLON</option></select></div></div>
    <div class="form-row"><div class="input-group"><label>LÆNGDE [mm]</label><input type="number" id="l-l" value="200"></div><div class="input-group"><label>Ø / B [mm]</label><input type="number" id="l-w" value="50"></div></div>
    <div class="panel-title" style="margin-top:20px">/// HÅRDHED (HRC)</div>
    <input type="number" id="l-hrc" value="45">
  </div>
  <div class="hud-panel display-panel">
    <div class="panel-title">/// DATA</div>
    <div class="data-readout active-readout"><div class="readout-label">VÆGT (KG)</div><div class="readout-val"><span id="l-wt">0</span></div></div>
    <div class="data-readout"><div class="readout-label">Rm (N/mm²)</div><div class="readout-val"><span id="l-rm">0</span></div></div>
  </div>
</div>

<script>
  (function() {
    function calc() {
      const l = parseFloat(document.getElementById('l-l').value)/10, w = parseFloat(document.getElementById('l-w').value)/10, rho = parseFloat(document.getElementById('l-m').value);
      let vol = document.getElementById('l-s').value==='cyl' ? Math.PI*Math.pow(w/2,2)*l : w*w*l;
      document.getElementById('l-wt').innerText = (vol*rho/1000).toFixed(2);
      document.getElementById('l-rm').innerText = (parseFloat(document.getElementById('l-hrc').value)*32.5).toFixed(0);
    }
    document.querySelectorAll('#viewport input, #viewport select').forEach(i => i.addEventListener('input', calc));
    calc();
  })();
</script>
