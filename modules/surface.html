<div class="module-header">
  <div class="hud-badge">MOD_04_ACTIVE</div>
  <h2>Topografi_Ra</h2>
  <p>Teoretisk ruhedsanalyse og N-klasse reference.</p>
</div>
<div class="hud-grid">
  <div class="hud-panel">
    <div class="panel-title">/// RUHEDS_PARAMETRE</div>
    <div class="form-row">
      <div class="input-group"><label>TILSPÆNDING (f)</label><input type="number" id="s-f" value="0.2" step="0.01"></div>
      <div class="input-group"><label>RADIUS (Re)</label><select id="s-re"><option value="0.2">0.2</option><option value="0.4" selected>0.4</option><option value="0.8">0.8</option></select></div>
    </div>
  </div>
  <div class="hud-panel display-panel">
    <div class="panel-title">/// RESULTAT</div>
    <div class="data-readout active-readout"><div class="readout-label">Ra (µm)</div><div class="readout-val"><span id="s-ra">0.00</span></div></div>
    <div class="data-readout"><div class="readout-label">N-KLASSE</div><div class="readout-val" style="color:var(--core-orange)"><span id="s-n">N7</span></div></div>
  </div>
</div>

<script>
  (function() {
    function calc() {
      const f = parseFloat(document.getElementById('s-f').value) || 0;
      const re = parseFloat(document.getElementById('s-re').value);
      const ra = ((f**2)/(8*re)) * 250;
      document.getElementById('s-ra').innerText = ra.toFixed(2);
      document.getElementById('s-n').innerText = ra < 0.8 ? "N6" : ra < 1.6 ? "N7" : "N8";
    }
    document.querySelectorAll('#viewport input, #viewport select').forEach(i => i.addEventListener('input', calc));
    calc();
  })();
</script>
