<div class="module-header">
  <div class="hud-badge">MOD_05_ACTIVE</div>
  <h2>PCD_Hulcirkel</h2>
  <p>Koordinat-mapping af flangemønstre.</p>
</div>
<div class="hud-grid">
  <div class="hud-panel">
    <div class="panel-title">/// DEFINITION</div>
    <div class="form-row"><div class="input-group"><label>PCD Ø</label><input type="number" id="p-d" value="100"></div><div class="input-group"><label>ANTAL</label><input type="number" id="p-n" value="4"></div></div>
    <div class="form-row"><div class="input-group"><label>X CENTER</label><input type="number" id="p-cx" value="0"></div><div class="input-group"><label>Y CENTER</label><input type="number" id="p-cy" value="0"></div></div>
  </div>
  <div class="hud-panel display-panel">
    <div class="panel-title">/// KOORDINATER</div>
    <div id="p-res" style="overflow-y:auto; max-height:220px; background:var(--void-bg); padding:10px; font-size:0.8rem; border:1px solid var(--panel-border)"></div>
    <div class="sys-msg">> KORDE: <span id="p-ch">0</span> mm</div>
  </div>
</div>

<script>
  (function() {
    function calc() {
      const d = parseFloat(document.getElementById('p-d').value), n = parseInt(document.getElementById('p-n').value);
      const cx = parseFloat(document.getElementById('p-cx').value), cy = parseFloat(document.getElementById('p-cy').value);
      let h = '<table style="width:100%">';
      for(let i=0; i<n; i++){
        let r = (i*360/n)*(Math.PI/180);
        h += `<tr><td>#${i+1}</td><td>X ${(cx+d/2*Math.cos(r)).toFixed(3)}</td><td>Y ${(cy+d/2*Math.sin(r)).toFixed(3)}</td></tr>`;
      }
      document.getElementById('p-res').innerHTML = h + '</table>';
      document.getElementById('p-ch').innerText = (d * Math.sin((180/n)*(Math.PI/180))).toFixed(3);
    }
    document.querySelectorAll('#viewport input').forEach(i => i.addEventListener('input', calc));
    calc();
  })();
</script>
