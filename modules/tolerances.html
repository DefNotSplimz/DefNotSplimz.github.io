<div class="module-header">
  <div class="hud-badge">MOD_03_ACTIVE</div>
  <h2>ISO_Pasning_Engine</h2>
  <p>Analyse af toleranceklasser og DIN 6885 pasfjedre.</p>
</div>
<div class="hud-grid">
  <div class="hud-panel">
    <div class="panel-title">/// DEFINITION</div>
    <div class="form-row"><div class="input-group" style="grid-column:1/-1"><label>NOMINEL Ø (d)</label><input type="number" id="f-d" value="20"></div></div>
    <div class="form-row">
      <div class="input-group"><label>HUL (H7/H8...)</label><select id="f-h-it"><option value="H7">H7</option><option value="H8">H8</option></select></div>
      <div class="input-group"><label>AKSEL (h6/g6...)</label><select id="f-s-it"><option value="h6">h6</option><option value="g6">g6</option><option value="p6">p6</option></select></div>
    </div>
    <div class="panel-title" style="margin-top:20px">/// DIN 6885 PASFEDER</div>
    <div class="data-readout"><div class="readout-label">B x H (Dybde)</div><div class="readout-val" id="f-key" style="font-size:1rem; color:var(--hud-blue)">-</div></div>
  </div>
  <div class="hud-panel display-panel">
    <div class="panel-title">/// ANALYSE</div>
    <div class="data-readout active-readout"><div class="readout-label">TYPE</div><div class="readout-val" id="f-type" style="font-size:1.1rem">SPILLERUM</div></div>
    <div class="data-readout"><div class="readout-label">HUL MAX/MIN</div><div class="readout-val" id="f-h-lim" style="font-size:1rem">0/0</div></div>
    <div class="data-readout"><div class="readout-label">AKSEL MAX/MIN</div><div class="readout-val" id="f-s-lim" style="font-size:1rem">0/0</div></div>
  </div>
</div>

<script>
  (function() {
    function calc() {
      const d = parseFloat(document.getElementById('f-d').value);
      const h_dev = d<=30 ? 21 : 33;
      const s_dev = d<=30 ? -7 : -9;
      document.getElementById('f-h-lim').innerText = `${(d+h_dev/1000).toFixed(3)} / ${d.toFixed(3)}`;
      document.getElementById('f-s-lim').innerText = `${(d+s_dev/1000).toFixed(3)} / ${(d+(s_dev-13)/1000).toFixed(3)}`;
      
      let kw = "N/A";
      if(d>17 && d<=22) kw = "6 x 6 (3.5)";
      else if(d<=30) kw = "8 x 7 (4.0)";
      else if(d<=38) kw = "10 x 8 (5.0)";
      document.getElementById('f-key').innerText = kw;
    }
    document.querySelectorAll('#viewport input, #viewport select').forEach(i => i.addEventListener('input', calc));
    calc();
  })();
</script>
