<div class="module-header">
  <div class="hud-badge">MOD_02_ACTIVE</div>
  <h2>Gevind_Bibliotek</h2>
  <p>Fuld database over M, MF, UNC, UNF og G-gevind med CNC-synkronisering.</p>
</div>
<div class="hud-grid">
  <div class="hud-panel">
    <div class="panel-title">/// PARAMETRE</div>
    <div class="form-row">
      <div class="input-group"><label>TYPE</label><select id="t-type"><option value="M">M - METRISK GROV</option><option value="MF" selected>MF - METRISK FIN</option><option value="UNC">UNC</option><option value="UNF">UNF</option><option value="G">G - RØR</option></select></div>
      <div class="input-group"><label>STR.</label><select id="t-size"></select></div>
    </div>
    <div class="form-row"><div class="input-group" style="grid-column:1/-1"><label>SPINDEL (RPM)</label><input type="number" id="t-rpm" value="400"></div></div>
  </div>
  <div class="hud-panel display-panel">
    <div class="panel-title">/// RESULTAT</div>
    <div class="data-readout active-readout"><div class="readout-label">KERNEBOR</div><div class="readout-val"><span id="t-drill">0.0</span> <small>MM</small></div></div>
    <div class="data-readout"><div class="readout-label">STIGNING (P)</div><div class="readout-val"><span id="t-pitch">0.000</span> <small>MM</small></div></div>
    <div class="data-readout"><div class="readout-label">Vf (TILSPÆND)</div><div class="readout-val" style="color:var(--hud-blue)"><span id="t-vf">0</span> <small>MM/MIN</small></div></div>
  </div>
</div>

<script>
  (function() {
    const db = {
      M:{ 'M3':{p:0.5,d:2.5}, 'M4':{p:0.7,d:3.3}, 'M5':{p:0.8,d:4.2}, 'M6':{p:1.0,d:5.0}, 'M8':{p:1.25,d:6.8}, 'M10':{p:1.5,d:8.5}, 'M12':{p:1.75,d:10.2}, 'M16':{p:2.0,d:14.0} },
      MF:{ 'M3x0.35':{p:0.35,d:2.65}, 'M6x0.75':{p:0.75,d:5.2}, 'M8x1':{p:1,d:7}, 'M10x1':{p:1,d:9}, 'M12x1.5':{p:1.5,d:10.5}, 'M16x1.5':{p:1.5,d:14.5} },
      UNC:{ '1/4"-20':{p:1.27,d:5.1}, '1/2"-13':{p:1.95,d:10.8} },
      G:{ 'G1/8"':{p:0.907,d:8.8}, 'G1/4"':{p:1.337,d:11.8} }
    };
    const tType = document.getElementById('t-type');
    const tSize = document.getElementById('t-size');

    function pop() {
      tSize.innerHTML = Object.keys(db[tType.value]).map(k => `<option value="${k}">${k}</option>`).join('');
      calc();
    }
    function calc() {
      const data = db[tType.value][tSize.value];
      if(!data) return;
      document.getElementById('t-drill').innerText = data.d.toFixed(2);
      document.getElementById('t-pitch').innerText = data.p.toFixed(3);
      document.getElementById('t-vf').innerText = (data.p * parseFloat(document.getElementById('t-rpm').value)).toFixed(0);
    }
    tType.addEventListener('change', pop);
    tSize.addEventListener('change', calc);
    document.getElementById('t-rpm').addEventListener('input', calc);
    pop();
  })();
</script>
