                    <h3 class="text-primary font-mono text-[10px] font-black tracking-widest uppercase italic">// Spindel_Runout_Log_(T.I.R.)</h3>

                    <div class="flex flex-col gap-1"><label class="text-[9px] font-mono text-zinc-500 uppercase">Måling 180° (µm)</label><input type="number" id="tir-180" placeholder="0" class="p-2 bg-black border border-zinc-800 font-mono text-right text-red-500 font-bold"></div>
                    <button type="submit" class="btn-industrial py-2 text-xs uppercase font-black italic">Log_Måling</button>
                </form>

                <div class="overflow-x-auto tabular-nums text-[11px] font-mono">
                    <table class="w-full text-left">
                        <thead><tr class="text-zinc-500 uppercase border-b border-zinc-800"><th class="p-3">Dato</th><th class="p-3 text-primary">Kast (T.I.R.)</th><th class="p-3">Målsted</th><th class="p-3">Status</th></tr></thead>
                        <tbody id="runout-table-body">
                            </tbody>
                    </table>
                </div>

            <section class="module-card p-8 bg-black">

                        <label class="flex items-center justify-between"><span class="text-white font-bold">Centralsmøring_Tjek</span><input type="checkbox" class="accent-primary" checked></label>
                        <label class="flex items-center justify-between"><span class="text-white font-bold">Kølevand_Koncentration</span><input type="checkbox" class="accent-primary"></label>

                    </div>
                    <div class="text-center p-6 border border-zinc-900 bg-black/40">
                        <span class="text-zinc-600 block mb-2 uppercase tracking-widest">Næste_Geometrisk_Service</span>

                    </div>
                </div>

    <script src="shared_core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const machineSelect = document.getElementById('machine-select');
            const runoutTable = document.getElementById('runout-table-body');

            // Udfyld maskiner
            machineSelect.innerHTML = Object.entries(MACHINING_DB.MACHINES)
                .map(([k, m]) => `<option value="${k}">${m.name}</option>`).join('');

            document.getElementById('runout-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const m0 = parseFloat(document.getElementById('tir-0').value) || 0;
                const m180 = parseFloat(document.getElementById('tir-180').value) || 0;
                const tir = Math.abs(m0 - m180);

                const entry = {
                    date: new Date().toLocaleDateString('da-DK'),
                    tir: tir,
                    mKey: machineSelect.value
                };

                MachiningOS.saveLogEntry('machine_tir', entry);
                renderTirLogs();
            });

            function renderTirLogs() {
                const logs = MachiningOS.getLogs('machine_tir').filter(l => l.mKey === machineSelect.value);
                runoutTable.innerHTML = logs.map(l => `
                    <tr class="border-b border-zinc-900 hover:bg-white/5 transition-colors">
                        <td class="p-3 text-zinc-400">${l.date}</td>
                        <td class="p-3 text-red-500 font-black">${l.tir} µm</td>
                        <td class="p-3 text-zinc-400">Spindel-næse</td>
                        <td class="p-3 ${l.tir > 5 ? 'text-red-600 font-bold' : 'text-zinc-600'}">${l.tir > 5 ? 'SERVICE KRÆVES' : 'INDEN FOR SPEC'}</td>
                    </tr>`).join('');
            }
            
            machineSelect.addEventListener('change', renderTirLogs);
            renderTirLogs(); // Initial render
        });
    </script>
