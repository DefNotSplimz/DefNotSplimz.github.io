<!DOCTYPE html>
<html lang="da" class="dark">
<head>
    <meta charset="UTF-8">
    <title>DATUM_OS // INVENTORY_HUB_v8.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #f59e0b; --bg: #050506; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--bg); color: #e4e4e7; }
        .glass-panel { background: rgba(12, 12, 14, 0.8); backdrop-filter: blur(20px); border: 1px solid #18181b; }
        .input-tactical { background: #000; border: 1px solid #18181b; padding: 12px; font-size: 11px; color: #fff; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-tactical:focus { border-color: var(--p); }
        .label-micro { font-size: 8px; text-transform: uppercase; letter-spacing: 0.2em; color: #52525b; font-weight: 800; margin-bottom: 4px; display: block; }
        .marker { position: absolute; width: 6px; height: 6px; border-color: var(--p); opacity: 0.3; }
        .marker-tl { top: -1px; left: -1px; border-top: 1px solid; border-left: 1px solid; }
        .marker-br { bottom: -1px; right: -1px; border-bottom: 1px solid; border-right: 1px solid; }
    </style>
</head>
<body class="flex min-h-screen overflow-x-hidden antialiased">

    <aside class="w-20 border-r border-zinc-900 flex flex-col items-center py-10 gap-10 bg-black z-50">
        <a href="gateway.html" class="text-[10px] font-black text-zinc-600 hover:text-primary transition-all uppercase tracking-tighter">OS</a>
        <div class="h-px w-8 bg-zinc-800"></div>
        <nav class="flex flex-col gap-8">
            <a href="hub.html" class="text-zinc-700 hover:text-white text-xs">01</a>
            <a href="inventory.html" class="text-primary font-black text-xs">04</a>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col">
        <header class="p-12 border-b border-zinc-900 bg-black/20 flex justify-between items-end">
            <div>
                <div class="flex items-center mb-4">
                    <div class="w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_8px_#f59e0b]"></div>
                    <span class="label-micro !text-primary !mb-0 ml-2">Inventory_Management_Protocol // v8.6</span>
                </div>
                <h1 class="text-7xl font-black italic tracking-tighter uppercase text-white">Stock_&_Crib</h1>
            </div>
            <div class="text-right">
                <span class="label-micro">Total_Lager_Vægt</span>
                <div id="total-stock-weight" class="text-3xl font-black text-primary italic tabular-nums">0.000 <small class="text-xs uppercase font-bold">kg</small></div>
            </div>
        </header>

        <div class="p-12 grid grid-cols-1 xl:grid-cols-12 gap-12 max-w-[1800px]">
            
            <section class="xl:col-span-6 space-y-6">
                <div class="glass-panel p-8 relative">
                    <div class="marker marker-tl"></div><div class="marker marker-br"></div>
                    <span class="label-micro !text-zinc-400 mb-6">// Register_Instrument</span>
                    
                    <form id="tool-form" class="space-y-4">
                        <div class="grid grid-cols-4 gap-2">
                            <div class="col-span-1"><label class="label-micro">T_Num</label><input type="number" id="tool-t" required class="input-tactical !text-primary font-black"></div>
                            <div class="col-span-1"><label class="label-micro">Operation</label><select id="tool-cat" class="input-tactical"><option value="mill">Mill</option><option value="turn">Turn</option></select></div>
                            <div class="col-span-2"><label class="label-micro">Type</label><select id="tool-type" class="input-tactical"></select></div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div><label id="label-tool-d" class="label-micro">Ø (mm)</label><input type="number" id="tool-d" step="0.01" required class="input-tactical"></div>
                            <div><label id="label-tool-z" class="label-micro">Teeth (Z)</label><input type="number" id="tool-z" step="1" required class="input-tactical"></div>
                            <div><label id="label-tool-lc" class="label-micro">Lc (Length)</label><input type="number" id="tool-lc" step="0.01" class="input-tactical"></div>
                        </div>
                        <div><label class="label-micro">Material_Grade</label><select id="tool-mat" class="input-tactical"><option value="HM">HM (Hårdmetal)</option><option value="HSS-Co">HSS-Co</option><option value="Cermet">Cermet</option><option value="PCD">PCD</option></select></div>
                        <button type="submit" id="btn-submit-tool" class="w-full py-4 bg-zinc-800 text-white font-black text-[10px] uppercase tracking-[0.4em] hover:bg-primary hover:text-black transition-all">Commit_Instrument</button>
                    </form>
                </div>

                <div class="glass-panel p-6 overflow-x-auto">
                    <span class="label-micro mb-4">Active_Instrument_Crib</span>
                    <table class="w-full text-[10px] tabular-nums">
                        <thead><tr class="text-zinc-600 border-b border-zinc-900 uppercase italic"><th class="pb-3 text-left">T_ID</th><th class="pb-3 text-left">Geometry</th><th class="pb-3 text-left">Specs</th><th class="pb-3 text-right">Action</th></tr></thead>
                        <tbody id="tool-table-body" class="divide-y divide-zinc-900/50"></tbody>
                    </table>
                </div>
            </section>

            <section class="xl:col-span-6 space-y-6">
                <div class="glass-panel p-8 relative border-l-primary/30">
                    <div class="marker marker-tl"></div><div class="marker marker-br"></div>
                    <span class="label-micro !text-zinc-400 mb-6">// Material_Entry</span>
                    
                    <form id="stock-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="label-micro">Base_Material</label><select id="work-material" class="input-tactical"></select></div>
                            <div><label class="label-micro">Profile_Type</label><select id="stock-type" class="input-tactical"><option value="round">Rund</option><option value="flat">Flad</option><option value="tube">Rør</option></select></div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="col-span-2"><label id="lbl-stock-dim1" class="label-micro">Dimension_1</label><input type="text" id="stock-dim1" required class="input-tactical"></div>
                            <div id="wrapper-stock-dim2" class="hidden"><label id="lbl-stock-dim2" class="label-micro">Dimension_2</label><input type="text" id="stock-dim2" class="input-tactical"></div>
                            <div><label class="label-micro">Length (mm)</label><input type="number" id="stock-len" required class="input-tactical font-bold text-primary"></div>
                        </div>
                        <button type="submit" id="btn-submit-stock" class="w-full py-4 bg-primary text-black font-black text-[10px] uppercase tracking-[0.4em] hover:bg-white transition-all">Update_Inventory</button>
                    </form>
                </div>

                <div class="glass-panel p-6 overflow-x-auto">
                    <span class="label-micro mb-4">Current_Material_Inventory</span>
                    <table class="w-full text-[10px] tabular-nums">
                        <thead><tr class="text-zinc-600 border-b border-zinc-900 uppercase italic"><th class="pb-3 text-left">Grade</th><th class="pb-3 text-left">Dimensions</th><th class="pb-3 text-left">Mass</th><th class="pb-3 text-right">Action</th></tr></thead>
                        <tbody id="inventory-table-body" class="divide-y divide-zinc-900/50"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="shared_core.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
