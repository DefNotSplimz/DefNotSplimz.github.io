<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Datum Prototyping | Stock Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:"#f59e0b"},fontFamily:{mono:['JetBrains Mono','monospace'],sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="bg-[#050506] text-zinc-100 font-sans subtle-grid min-h-screen flex flex-row relative overflow-x-hidden">

    <aside class="w-16 md:w-20 bg-black border-r border-zinc-800 flex flex-col items-center py-8 gap-6 sticky top-0 h-screen z-50 print:hidden shrink-0">
        <a href="gateway.html" class="p-2 hover:bg-zinc-900 transition-colors border border-transparent hover:border-primary/20 mb-4">
            <img src="img/logoA.svg" class="w-8 h-auto" alt="Datum">
        </a>
        <nav class="flex flex-col gap-3 flex-grow overflow-y-auto no-scrollbar">
            <a href="hub.html" title="CNC Hub" class="sidebar-nav-item" data-route="01">01</a>
            <a href="manual.html" title="Manual Shop" class="sidebar-nav-item" data-route="02">02</a>
            <a href="reference.html" title="Ref Vault" class="sidebar-nav-item" data-route="03">03</a>
            <a href="inventory.html" title="Stock Log" class="sidebar-nav-item" data-route="04">04</a>
            <div class="h-px w-8 bg-zinc-800 my-1 mx-auto"></div>
            <a href="metrology.html" title="Inspection" class="sidebar-nav-item" data-route="05">05</a>
            <a href="geometry.html" title="Geometry" class="sidebar-nav-item" data-route="06">06</a>
            <a href="assembly.html" title="Assembly" class="sidebar-nav-item" data-route="07">07</a>
            <a href="surfaces.html" title="Tribology" class="sidebar-nav-item" data-route="08">08</a>
            <div class="h-px w-8 bg-zinc-800 my-1 mx-auto"></div>
            <a href="analytics.html" title="Machine Health" class="sidebar-nav-item" data-route="09">09</a>
            <a href="fai.html" title="FAI Report" class="sidebar-nav-item" data-route="10">10</a>
            <a href="mechanisms.html" title="Mechanisms" class="sidebar-nav-item" data-route="11">11</a>
            <a href="electrotech.html" title="Electro-Mech" class="sidebar-nav-item" data-route="12">12</a>
            <div class="h-px w-8 bg-zinc-800 my-1 mx-auto"></div>
            <a href="materials.html" title="Materials" class="sidebar-nav-item" data-route="13">13</a>
            <a href="math.html" title="Shop Math" class="sidebar-nav-item" data-route="14">14</a>
            <a href="standards.html" title="Hardware" class="sidebar-nav-item" data-route="15">15</a>
            <a href="hightech.html" title="High-Tech" class="sidebar-nav-item active" data-route="16">16</a>
        </nav>
        <div class="status-dot"></div>
    </aside>

    <div class="flex-grow flex flex-col min-w-0">
        <header class="relative pt-24 pb-12 px-6 md:px-12 border-b border-zinc-900 bg-black">
            <div class="scanline opacity-10"></div>
            <div class="max-w-7xl mx-auto flex justify-between items-end">
                <div>
                    <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase italic">Stock Log</h1>
                    <p class="text-[10px] font-mono text-zinc-500 font-bold tracking-[0.4em] mt-4 uppercase italic">Råmateriale_Logistik_&_Masse // Route_04</p>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full p-6 md:p-12 space-y-12 py-16">
            
            <section class="module-card p-8 bg-black">
                <div class="flex items-center justify-between border-b border-zinc-800 pb-4 mb-8">
                    <h3 class="text-primary font-mono text-[10px] font-black tracking-widest uppercase italic">// Registrér_Lagerbeholdning</h3>
                    <span class="text-[9px] font-mono text-zinc-600 uppercase">Input: Reststykker / Ny-indkøb</span>
                </div>

                <form id="stock-form" class="grid grid-cols-12 gap-4 items-end bg-zinc-900/30 p-6 border border-zinc-900">
                    <div class="col-span-12 md:col-span-3 flex flex-col gap-1">
                        <label class="text-[8px] font-mono text-zinc-500 uppercase">Materiale</label>
                        <select id="work-material" class="p-2 bg-black border border-zinc-800 text-xs font-mono text-white"></select>
                    </div>
                    <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                        <label class="text-[8px] font-mono text-zinc-500 uppercase">Type (Rund/Flad)</label>
                        <select id="stock-type" class="p-2 bg-black border border-zinc-800 text-xs font-mono">
                            <option value="round">Rundstål</option>
                            <option value="flat">Fladstål / Plade</option>
                        </select>
                    </div>
                    <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                        <label class="text-[8px] font-mono text-zinc-500 uppercase">Dimension (Ø / BxH)</label>
                        <input type="text" id="stock-dim" placeholder="f.eks. 40" class="p-2 bg-black border border-zinc-800 font-mono text-sm">
                    </div>
                    <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                        <label class="text-[8px] font-mono text-zinc-500 uppercase">Længde (mm)</label>
                        <input type="number" id="stock-len" placeholder="500" class="p-2 bg-black border border-zinc-800 font-mono text-sm">
                    </div>
                    <button type="submit" class="col-span-12 md:col-span-3 btn-industrial py-2 text-xs font-black italic">TILFØJ_TIL_LAGER</button>
                </form>
            </section>

            <section class="module-card p-8 bg-black">
                <div class="flex items-center justify-between border-b border-zinc-800 pb-4 mb-8">
                    <h3 class="text-primary font-mono text-[10px] font-black tracking-widest uppercase italic">// Aktuel_Lagerstatus</h3>
                    <div class="flex gap-4">
                        <div class="text-right">
                            <span class="text-[8px] font-mono text-zinc-600 block uppercase">Total_Vægt</span>
                            <span id="total-stock-weight" class="text-xl font-black text-white italic tabular-nums">0.00 kg</span>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left font-mono text-[11px] tabular-nums">
                        <thead>
                            <tr class="text-zinc-500 uppercase border-b border-zinc-800 italic">
                                <th class="p-4">Materiale</th>
                                <th class="p-4">Form</th>
                                <th class="p-4">Dimension</th>
                                <th class="p-4">Længde</th>
                                <th class="p-4 text-primary">Vægt</th>
                                <th class="p-4 text-right">Handling</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="divide-y divide-zinc-900">
                            </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="shared_core.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
