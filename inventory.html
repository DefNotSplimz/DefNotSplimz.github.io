<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Machining_OS | Inventory_Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:"#f59e0b"},fontFamily:{mono:['JetBrains Mono','monospace'],sans:['Inter','sans-serif']}}}}</script>
</head>
<body class="bg-[#050506] text-zinc-100 font-sans min-h-screen flex flex-row relative overflow-x-hidden">

    <div class="subtle-grid"></div>

    <aside class="w-20 bg-black/40 backdrop-blur-xl border-r border-zinc-900 flex flex-col items-center py-8 gap-6 sticky top-0 h-screen z-50 shrink-0">
        <a href="gateway.html" class="p-2 hover:bg-zinc-900 border border-transparent hover:border-primary/20 transition-all group mb-4">
            <img src="img/logoA.svg" class="w-10 h-auto group-hover:drop-shadow-[0_0_10px_var(--primary-glow)]" alt="DP">
        </a>
        <nav class="flex flex-col gap-2 flex-grow overflow-y-auto no-scrollbar">
            <a href="hub.html" class="sidebar-nav-item" data-route="01">01</a>
            <a href="manual.html" class="sidebar-nav-item" data-route="02">02</a>
            <a href="reference.html" class="sidebar-nav-item" data-route="03">03</a>
            <a href="inventory.html" class="sidebar-nav-item active" data-route="04">04</a>
            <div class="h-px w-8 bg-zinc-800 my-2 mx-auto"></div>
            <a href="metrology.html" class="sidebar-nav-item" data-route="05">05</a>
        </nav>
        <div class="status-dot mt-auto"></div>
    </aside>

    <div class="flex-grow flex flex-col min-w-0">
        <header class="relative pt-24 pb-12 px-6 md:px-12 border-b border-zinc-900 bg-black">
            <div class="scanline opacity-10"></div>
            <div class="max-w-7xl mx-auto">
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase italic leading-none">Inventory_Hub</h1>
                <p class="text-[10px] font-mono text-zinc-500 font-bold tracking-[0.4em] mt-4 uppercase italic">Stock_Log_&_Instrument_Crib // Route_04</p>
            </div>
        </header>

        <main class="relative z-10 max-w-7xl mx-auto w-full p-6 md:p-12 space-y-16 py-16">
            
            <section class="space-y-8">
                <div class="module-card p-8 bg-black">
                    <div class="flex items-center justify-between border-b border-zinc-800 pb-4 mb-8 uppercase italic font-black">
                        <h3 class="text-primary font-mono text-[10px] tracking-widest">// Register_New_Instrument</h3>
                    </div>
                    <form id="tool-form" class="grid grid-cols-12 gap-4 items-end bg-zinc-900/30 p-6 border border-zinc-900">
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">T-Number</label>
                            <input type="number" id="tool-t" required class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                        </div>
                        
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Operation</label>
                            <select id="tool-cat" class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                                <option value="mill" class="bg-zinc-900">Fræsning</option>
                                <option value="turn" class="bg-zinc-900">Drejning</option>
                            </select>
                        </div>
                        
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Type</label>
                            <select id="tool-type" class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                                </select>
                        </div>
                        
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label id="label-tool-d" class="text-[8px] font-mono text-zinc-500 uppercase">Ø mm</label>
                            <input type="number" id="tool-d" step="0.01" required class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                        </div>
                        
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label id="label-tool-z" class="text-[8px] font-mono text-zinc-500 uppercase">Teeth (Z)</label>
                            <input type="number" id="tool-z" step="0.01" required class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                        </div>
                        
                        <div class="col-span-4 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Material</label>
                            <select id="tool-mat" class="p-2 bg-black border border-zinc-800 text-xs text-primary font-black outline-none focus:border-primary/50">
                                <option value="HM" class="bg-zinc-900">HM (Hårdmetal)</option>
                                <option value="HSS" class="bg-zinc-900">HSS</option>
                                <option value="Cermet" class="bg-zinc-900">Cermet</option>
                                <option value="CBN" class="bg-zinc-900">CBN</option>
                                <option value="PCD" class="bg-zinc-900">PCD</option>
                            </select>
                        </div>
                        <button type="submit" id="btn-submit-tool" class="col-span-12 btn-industrial py-3 mt-2 text-[10px] font-black italic hover:bg-primary/10">COMMIT_INSTRUMENT</button>
                    </form>
                </div>

                <div class="module-card p-8 bg-black">
                    <table class="w-full text-left font-mono text-[11px] tabular-nums">
                        <thead>
                            <tr class="text-zinc-600 uppercase border-b border-zinc-800 italic">
                                <th class="p-4">T_ID</th><th class="p-4">Type</th><th class="p-4">Specifikation</th><th class="p-4">Material</th><th class="p-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="tool-table-body" class="divide-y divide-zinc-900"></tbody>
                    </table>
                </div>
            </section>

            <div class="h-px bg-zinc-900 w-full opacity-50"></div>

            <section class="space-y-8">
                <div class="module-card p-8 bg-black">
                    <form id="stock-form" class="grid grid-cols-12 gap-4 items-end bg-zinc-900/30 p-6 border border-zinc-900">
                        <div class="col-span-12 md:col-span-3 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Materiale</label>
                            <select id="work-material" class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50"></select>
                        </div>
                        <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Type</label>
                            <select id="stock-type" class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                                <option value="round" class="bg-zinc-900">Rundstål</option>
                                <option value="flat" class="bg-zinc-900">Fladstål</option>
                            </select>
                        </div>
                        <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Dimension</label>
                            <input type="text" id="stock-dim" required class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                        </div>
                        <div class="col-span-6 md:col-span-2 flex flex-col gap-1">
                            <label class="text-[8px] font-mono text-zinc-500 uppercase">Længde (mm)</label>
                            <input type="number" id="stock-len" required class="p-2 bg-black border border-zinc-800 text-xs text-white outline-none focus:border-primary/50">
                        </div>
                        <button type="submit" id="btn-submit-stock" class="col-span-12 md:col-span-3 btn-industrial py-2 text-[10px] font-black italic hover:bg-primary/10">TILFØJ_LAGER</button>
                    </form>
                </div>

                <div class="module-card p-8 bg-black">
                    <div class="flex justify-between border-b border-zinc-800 pb-4 mb-8 items-end">
                        <h3 class="text-zinc-500 font-mono text-[10px] font-black uppercase italic">// Aktuel_Lagerstatus</h3>
                        <span id="total-stock-weight" class="text-xl font-black text-white italic tabular-nums">0.00 kg</span>
                    </div>
                    <table class="w-full text-left font-mono text-[11px] tabular-nums">
                        <thead>
                            <tr class="text-zinc-600 uppercase border-b border-zinc-800 italic">
                                <th class="p-4">Materiale</th><th class="p-4">Form</th><th class="p-4">Dim</th><th class="p-4">Længde</th><th class="p-4 text-primary">Vægt</th><th class="p-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="divide-y divide-zinc-900"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="shared_core.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
