<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Datum Prototyping | G-Code Inspector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { primary: "#f59e0b" } }
            }
        }
    </script>
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans antialiased p-6">

    <div class="max-w-7xl mx-auto w-full">
        <header class="mb-12 border-b border-zinc-800 pb-6">
            <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-8">
                <div>
                    <h1 class="text-5xl font-black tracking-tighter uppercase italic text-white">G-Code <span class="text-zinc-600">&</span> Syntax</h1>
                    <div class="text-[10px] font-mono text-primary tracking-[0.4em] uppercase font-bold mt-2 italic">Datum Prototyping // Multi_System_Inspector</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full md:w-[500px]">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 mb-2 block">Søg</label>
                        <input type="text" id="code-search" class="w-full bg-zinc-900 border border-zinc-800 p-3 text-white text-xs" placeholder="Eks: G83...">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 mb-2 block">System</label>
                        <select id="system-filter" class="w-full bg-zinc-900 border border-zinc-800 p-3 text-white text-xs">
                            <option value="ALL">ALL_SYSTEMS</option>
                            <option value="ISO">ISO_ONLY</option>
                            <option value="Haas">HAAS_CNC</option>
                            <option value="Fanuc">FANUC_CONTROL</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2 grid md:grid-cols-2 gap-8">
                <div class="bg-black/40 border border-zinc-900 p-6">
                    <div class="text-primary font-mono text-xs font-black mb-6 uppercase italic tracking-widest">// PREPARATORY_G</div>
                    <div id="g-list" class="space-y-1"></div>
                </div>
                <div class="bg-black/40 border border-zinc-900 p-6">
                    <div class="text-primary font-mono text-xs font-black mb-6 uppercase italic tracking-widest">// MISCELLANEOUS_M</div>
                    <div id="m-list" class="space-y-1"></div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div id="inspector-hint" class="sticky top-6 p-12 border border-dashed border-zinc-900 text-center opacity-30 min-h-[500px] flex flex-col justify-center">
                    <div class="text-5xl font-black text-zinc-800">G?</div>
                    <p class="text-[10px] uppercase font-bold text-zinc-500 mt-4 tracking-widest leading-relaxed">Vælg en kommando for teknisk dybde</p>
                </div>
                
                <div id="inspector" class="sticky top-6 bg-zinc-950 border border-primary/30 p-8 hidden min-h-[600px] flex flex-col">
                    <div class="mb-6">
                        <h2 id="ins-code" class="text-7xl font-black italic text-white leading-none mb-2">---</h2>
                        <p id="ins-name" class="text-sm font-bold uppercase text-zinc-400 italic">---</p>
                    </div>

                    <div class="mb-8">
                        <div class="text-[10px] text-zinc-600 uppercase font-bold mb-3 tracking-widest border-b border-zinc-900 pb-1 italic">Block_Syntax</div>
                        <div id="ins-syntax" class="bg-black p-5 font-mono text-xs text-primary border-l-4 border-primary italic break-all font-bold">---</div>
                    </div>

                    <div class="mb-8 flex-grow">
                        <div class="text-[10px] text-zinc-600 uppercase font-bold mb-3 tracking-widest border-b border-zinc-900 pb-1 italic">Teknisk_Forklaring</div>
                        <div id="ins-long-desc" class="text-xs text-zinc-300 leading-relaxed space-y-4 font-medium">
                            </div>
                    </div>

                    <div class="mb-8">
                        <div class="text-[10px] text-zinc-600 uppercase font-bold mb-3 tracking-widest border-b border-zinc-900 pb-1 italic">Argument_Mapping</div>
                        <div id="ins-params" class="space-y-3"></div>
                    </div>

                    <div class="mt-auto pt-6 border-t border-zinc-900">
                        <div id="ins-system-badge" class="inline-block px-3 py-1 bg-primary/10 border border-primary/20 text-primary text-[8px] font-black uppercase tracking-widest italic">---</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const gList = document.getElementById('g-list');
        const mList = document.getElementById('m-list');
        const searchInput = document.getElementById('code-search');
        const systemFilter = document.getElementById('system-filter');

        function renderCodes() {
            const filterStr = searchInput.value.toLowerCase();
            const sysFilter = systemFilter.value;
            gList.innerHTML = '';
            mList.innerHTML = '';

            ['G', 'M'].forEach(type => {
                const container = type === 'G' ? gList : mList;
                codeDB[type].forEach(item => {
                    const matchesSearch = item.code.toLowerCase().includes(filterStr) || item.name.toLowerCase().includes(filterStr);
                    let matchesSystem = (sysFilter === 'ALL') || 
                                          (sysFilter === 'ISO' && item.system === 'ISO') || 
                                          (item.system === sysFilter || item.system === 'ISO');

                    if (matchesSearch && matchesSystem) {
                        const div = document.createElement('div');
                        div.className = "flex items-center justify-between p-4 border border-zinc-900 bg-zinc-900/20 hover:border-primary transition-all cursor-pointer group mb-1";
                        div.onclick = () => showInspector(type, item.code);
                        const badgeColor = item.system === 'ISO' ? 'text-zinc-600' : 'text-primary';
                        div.innerHTML = `
                            <div class="flex items-center gap-5">
                                <div class="text-primary font-black font-mono text-xl italic w-14 shrink-0 group-hover:translate-x-1 transition-transform">${item.code}</div>
                                <div>
                                    <div class="text-white font-bold text-[10px] uppercase tracking-widest">${item.name}</div>
                                    <div class="text-[8px] font-mono ${badgeColor} font-bold mt-1 tracking-tighter">[${item.system}]</div>
                                </div>
                            </div>
                        `;
                        container.appendChild(div);
                    }
                });
            });
        }

function showInspector(type, codeStr) {
            const item = codeDB[type].find(c => c.code === codeStr);
            if (!item) return;

            document.getElementById('inspector-hint').classList.add('hidden');
            const ins = document.getElementById('inspector');
            ins.classList.remove('hidden');

            document.getElementById('ins-code').innerText = item.code;
            document.getElementById('ins-name').innerText = item.name;
            document.getElementById('ins-syntax').innerText = item.syntax || "N/A";
            
            // Indsæt forklaringen
            const explanation = item.longDesc || item.desc || "Ingen data.";
            document.getElementById('ins-long-desc').innerHTML = explanation.replace(/\n/g, '<br><br>');

            // --- DETTE ER DEN VIGTIGE DEL ---
            // Fortæl MathJax at den skal rendere de nye symboler
            if (window.MathJax) {
                MathJax.typeset();
            }
            // --------------------------------

            // Parametre
            const paramContainer = document.getElementById('ins-params');
            paramContainer.innerHTML = '';
            if (item.params) {
                for (const [key, val] of Object.entries(item.params)) {
                    paramContainer.innerHTML += `
                        <div class="flex items-start gap-4 py-2 border-b border-zinc-900/50">
                            <span class="text-primary font-mono font-bold text-xs w-10">${key}</span>
                            <span class="text-zinc-500 font-mono text-[9px] italic font-bold uppercase">${val}</span>
                        </div>
                    `;
                }
            }
        }

        searchInput.addEventListener('input', renderCodes);
        systemFilter.addEventListener('change', renderCodes);
        window.onload = renderCodes;
    </script>
</body>
</html>
