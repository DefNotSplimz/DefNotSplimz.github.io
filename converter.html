<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Datum Prototyping | Unit Converter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: "#a1a1aa" },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans antialiased subtle-grid min-h-screen flex flex-col p-6">

    <div class="max-w-6xl mx-auto w-full">
        <header class="mb-12 border-b border-zinc-800 pb-6 flex flex-col md:flex-row md:justify-between md:items-end gap-6 no-print">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase italic text-white">Unit <span class="text-zinc-600">&</span> Scale</h1>
                <div class="text-[10px] font-mono text-zinc-400 tracking-[0.4em] uppercase font-bold mt-2 mb-6">Datum Prototyping // Conv_Rev01</div>
                
                <a href="hub.html" class="inline-flex items-center justify-center px-6 py-2.5 text-[10px] font-mono font-bold uppercase tracking-widest border border-zinc-800 bg-[#0c0c0e] text-zinc-500 hover:text-white hover:border-zinc-600 transition-colors">
                    ← Return_To_Hub
                </a>
            </div>
            <div class="font-mono text-[10px] text-zinc-500 font-bold uppercase italic pb-2 md:pb-0">
                Precision_Level: <span class="text-white font-black">0.0001 mm</span>
            </div>
        </header>

        <div class="grid lg:grid-cols-2 gap-12">
            
            <div class="space-y-8">
                <div class="bg-black/40 border border-zinc-900 p-6">
                    <div class="section-header mt-0">// 01_INCH_METRIC_ENGINE</div>
                    <div class="grid grid-cols-1 gap-6">
                        <div class="relative">
                            <label class="label-text">Inches ["]</label>
                            <input type="number" id="conv-inch" class="input-field text-2xl font-black border-zinc-700 focus:border-white transition-all" placeholder="0.000" step="0.001">
                            <span class="absolute right-4 bottom-3 text-zinc-700 font-black italic">IN</span>
                        </div>
                        <div class="flex justify-center py-2">
                            <div class="text-zinc-800 font-black text-2xl">⇅</div>
                        </div>
                        <div class="relative">
                            <label class="label-text text-white">Millimeters [mm]</label>
                            <input type="number" id="conv-mm" class="input-field text-2xl font-black border-zinc-700 focus:border-white transition-all" placeholder="0.000" step="0.001">
                            <span class="absolute right-4 bottom-3 text-zinc-700 font-black italic">MM</span>
                        </div>
                    </div>
                </div>

                <div class="bg-black/40 border border-zinc-900 p-6">
                    <div class="section-header mt-0">// 02_FRACTION_QUICK_SELECT</div>
                    <div class="grid grid-cols-4 gap-2" id="fraction-buttons">
                        </div>
                    <p class="mt-4 text-[9px] font-mono text-zinc-600 uppercase italic font-bold leading-relaxed">
                        Vælg en standardbrøk for at nulstille beregneren til præcise dimensioner.
                    </p>
                </div>
            </div>

            <div class="bg-black/40 border border-zinc-900 p-6">
                <div class="section-header mt-0">// 03_FRACTION_TO_METRIC_MATRIX</div>
                <div class="overflow-y-auto max-h-[600px] border border-zinc-800 bg-zinc-950/50">
                    <table class="w-full text-left font-mono text-[10px] uppercase italic">
                        <thead class="sticky top-0 bg-zinc-900 border-b border-zinc-800">
                            <tr class="text-zinc-500">
                                <th class="p-3">Brøk (")</th>
                                <th class="p-3">Decimal (")</th>
                                <th class="p-3 text-right">Metrisk (mm)</th>
                            </tr>
                        </thead>
                        <tbody id="fraction-table-body">
                            </tbody>
                    </table>
                </div>
                <button onclick="window.print()" class="no-print w-full mt-6 border border-zinc-800 bg-zinc-900/50 hover:border-white text-zinc-500 hover:text-white text-[10px] uppercase font-bold py-3 transition-all italic">
                    Print Conversion Chart
                </button>
            </div>

        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const inchInput = document.getElementById('conv-inch');
        const mmInput = document.getElementById('conv-mm');
        const fractionTable = document.getElementById('fraction-table-body');
        const fractionButtons = document.getElementById('fraction-buttons');

        // Engine Logic
        inchInput.addEventListener('input', () => {
            const val = parseFloat(inchInput.value);
            if (!isNaN(val)) {
                mmInput.value = (val * conversion.inchToMm).toFixed(4);
            } else {
                mmInput.value = '';
            }
        });

        mmInput.addEventListener('input', () => {
            const val = parseFloat(mmInput.value);
            if (!isNaN(val)) {
                inchInput.value = (val * conversion.mmToInch).toFixed(4);
            } else {
                inchInput.value = '';
            }
        });

        // Matrix & UI Generation
        function initConverter() {
            // Generer knapper og tabelrækker
            conversion.fractions.forEach(item => {
                // Knapper
                const btn = document.createElement('button');
                btn.className = "bg-zinc-900 border border-zinc-800 p-2 text-[10px] font-mono font-black text-zinc-400 hover:text-white hover:border-white transition-all italic";
                btn.innerText = item.f;
                btn.onclick = () => {
                    inchInput.value = item.d;
                    mmInput.value = (item.d * conversion.inchToMm).toFixed(4);
                };
                fractionButtons.appendChild(btn);

                // Tabel
                const row = document.createElement('tr');
                row.className = "border-b border-zinc-900/50 hover:bg-zinc-900/30 transition-colors cursor-pointer group";
                row.onclick = () => {
                    inchInput.value = item.d;
                    mmInput.value = (item.d * conversion.inchToMm).toFixed(4);
                };
                row.innerHTML = `
                    <td class="p-3 text-white font-black">${item.f}</td>
                    <td class="p-3 text-zinc-500">${item.d.toFixed(4)}</td>
                    <td class="p-3 text-right text-zinc-400 group-hover:text-white">${(item.d * conversion.inchToMm).toFixed(3)} mm</td>
                `;
                fractionTable.appendChild(row);
            });
        }

        window.onload = initConverter;
    </script>
</body>
</html>
