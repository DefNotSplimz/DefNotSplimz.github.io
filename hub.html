<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datum Prototyping | Operations Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="global.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: "#f59e0b" },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="bg-[#050506] text-zinc-100 font-sans antialiased subtle-grid selection:bg-primary selection:text-black min-h-screen flex flex-row relative overflow-x-hidden">

    <aside class="w-16 md:w-20 bg-black border-r border-zinc-800 flex flex-col items-center py-8 gap-6 sticky top-0 h-screen z-50 print:hidden shrink-0">
        <a href="gateway.html" class="p-2 hover:bg-zinc-900 transition-colors border border-transparent hover:border-primary/20 mb-4">
            <img src="img/logoA.svg" class="w-8 h-auto" alt="Datum">
        </a>

        <nav class="flex flex-col gap-3 flex-grow overflow-y-auto no-scrollbar">
            <a href="hub.html" title="CNC Hub" class="sidebar-nav-item" data-route="01">01</a>
            <a href="manual.html" title="Manual Shop" class="sidebar-nav-item" data-route="02">02</a>
            <a href="reference.html" title="Ref Vault" class="sidebar-nav-item" data-route="03">03</a>
            
            <div class="h-px w-8 bg-zinc-800 my-2 mx-auto"></div>
            
            <a href="metrology.html" title="Inspection" class="sidebar-nav-item" data-route="04">04</a>
            <a href="geometry.html" title="Geometry" class="sidebar-nav-item" data-route="05">05</a>
            <a href="assembly.html" title="Assembly" class="sidebar-nav-item" data-route="06">06</a>
            
            <div class="h-px w-8 bg-zinc-800 my-2 mx-auto"></div>
            
            <a href="analytics.html" title="Machine Health" class="sidebar-nav-item" data-route="07">07</a>
            <a href="fai.html" title="FAI Reporting" class="sidebar-nav-item" data-route="08">08</a>
            <a href="mechanisms.html" title="Mechanisms" class="sidebar-nav-item" data-route="09">09</a>
        </nav>

        <div class="status-dot"></div>
    </aside>

    <div class="flex-grow flex flex-col min-w-0">
        <header class="relative pt-24 pb-12 px-6 md:px-12 border-b border-zinc-900 bg-black overflow-hidden">
            <div class="scanline"></div>
            <div class="max-w-7xl mx-auto relative">
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase italic">Operations Hub</h1>
                <p class="text-[10px] font-mono text-zinc-500 font-bold tracking-[0.4em] mt-4 uppercase italic">High_Precision_Validation // Route_01</p>
            </div>
        </header>

        <section class="pt-12 px-6 md:px-12 bg-[#0c0c0e] print:hidden">
            <div class="max-w-7xl mx-auto">
                <div class="module-card p-8">
                    <div class="flex flex-col md:flex-row md:items-end justify-between border-b border-zinc-800 pb-4 mb-8 gap-6 uppercase italic font-bold">
                        <div class="text-primary font-mono text-[10px] tracking-widest">/ Project_Kontekst</div>
                        <div class="flex gap-4">
                            <button id="btn-export-json" class="text-[10px] font-mono text-primary hover:text-white border border-primary/30 px-3 py-1 bg-primary/10 tracking-widest transition-all">Eksportér_Data</button>
                        </div>
                    </div>
                    <form id="job-form" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Program (O)</label>
                            <input type="text" id="job-program" class="p-3 bg-black border border-zinc-800 text-white font-mono text-sm focus:border-primary transition-all outline-none">
                        </div>
                        <div class="flex flex-col gap-2 lg:col-span-2">
                            <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Emne Navn</label>
                            <input type="text" id="job-part" class="p-3 bg-black border border-zinc-800 text-white font-mono text-sm focus:border-primary transition-all outline-none">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Revision</label>
                            <input type="text" id="job-rev" class="p-3 bg-black border border-zinc-800 text-white font-mono text-sm focus:border-primary transition-all outline-none">
                        </div>
                        <div class="flex flex-col gap-2 lg:col-span-2">
                            <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Aktiv Maskine</label>
                            <select id="machine-select" class="p-3 bg-black border border-zinc-800 text-primary font-mono text-sm focus:border-primary outline-none appearance-none cursor-pointer">
                                </select>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section id="beregner" class="py-12 px-6 md:px-12 bg-[#0c0c0e] print:hidden">
            <div class="max-w-7xl mx-auto">
                <div class="grid lg:grid-cols-12 gap-px bg-zinc-800 border border-zinc-800">
                    <div class="lg:col-span-8 bg-[#09090b] p-8">
                        <div class="text-primary font-mono text-[10px] mb-8 font-black tracking-widest uppercase italic">/ Parameter_Input</div>
                        <form id="cnc-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Vælg Værktøj (Krybbe)</label>
                                    <select id="active-tool-select" class="p-3 bg-black border border-primary/20 text-primary font-bold appearance-none cursor-pointer focus:border-primary outline-none transition-all"></select>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Materiale</label>
                                    <select id="work-material" class="p-3 bg-black border border-zinc-800 text-white appearance-none cursor-pointer focus:border-primary outline-none transition-all"></select>
                                </div>
                            </div>

                            <div class="module-card p-5 bg-black">
                                <h4 class="text-[10px] font-mono text-zinc-600 uppercase tracking-widest mb-4 italic font-black">// Strategi & Indgreb</h4>
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[10px] font-mono text-zinc-500 uppercase font-black">Strategi</label>
                                        <select id="cam-strategy" class="p-3 bg-zinc-900 border border-zinc-800 appearance-none outline-none"></select>
                                    </div>
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[10px] font-mono text-zinc-500 uppercase font-black">Ae (Radial) mm</label>
                                        <input type="number" id="input-ae" step="0.001" class="p-3 bg-zinc-900 border border-zinc-800 focus:border-primary transition-all outline-none font-mono">
                                    </div>
                                    <div class="flex flex-col gap-2">
                                        <label class="text-[10px] font-mono text-zinc-500 uppercase font-black">Ap (Axial) mm</label>
                                        <input type="number" id="input-ap" step="0.001" class="p-3 bg-zinc-900 border border-zinc-800 focus:border-primary transition-all outline-none font-mono">
                                    </div>
                                </div>
                            </div>

                            <div class="flex items-center justify-between p-4 border border-zinc-800 bg-black/40">
                                <label class="text-[10px] font-mono text-zinc-500 uppercase font-black tracking-widest">Haas HSM Control</label>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="toggle-hsm" class="sr-only peer" checked>
                                    <div class="w-12 h-6 bg-zinc-900 border border-zinc-800 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-zinc-600 after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-6 peer-checked:after:bg-black"></div>
                                </label>
                            </div>
                            
                            <input type="hidden" id="hidden-d"><input type="hidden" id="hidden-z"><input type="hidden" id="hidden-mat"><input type="hidden" id="hidden-stickout">
                        </form>
                    </div>

                    <div class="lg:col-span-4 bg-black p-8 flex flex-col justify-between tabular-nums relative overflow-hidden">
                        <div class="scanline opacity-10"></div>
                        <div class="space-y-12">
                            <div class="text-primary font-mono text-[10px] font-black tracking-widest uppercase italic">/ Validated_Outputs</div>
                            <div class="grid grid-cols-2 gap-4 border-b border-zinc-800 pb-6 text-center">
                                <div><span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Target Vc</span><br><span id="out-vc-range" class="text-xl font-bold text-white italic">0</span></div>
                                <div><span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Target fz</span><br><span id="out-fz-range" class="text-xl font-bold text-white italic">0</span></div>
                            </div>
                            <div>
                                <span class="text-[10px] font-mono text-zinc-600 uppercase font-black tracking-widest italic">// Mål_Spindel_RPM</span>
                                <div class="flex items-end gap-2 mt-2"><span id="out-rpm" class="text-6xl font-black tracking-tighter text-white uppercase italic">0</span><span class="text-xs font-mono text-zinc-500 font-bold mb-2">RPM</span></div>
                            </div>
                            <div>
                                <span class="text-[10px] font-mono text-zinc-600 uppercase font-black tracking-widest italic">// Mål_Tilspænding_Vf</span>
                                <div class="flex items-end gap-2 mt-2"><span id="out-vf" class="text-6xl font-black tracking-tighter text-white uppercase italic">0</span><span class="text-xs font-mono text-zinc-500 font-bold mb-2">MM/MIN</span></div>
                            </div>
                        </div>
                        <button id="btn-save" class="btn-industrial mt-12 w-full py-4 uppercase font-black italic tracking-widest"><span class="relative z-10">Gem_Til_Log</span></button>
                    </div>
                </div>
            </div>
        </section>

        <section class="pb-24 px-6 md:px-12 bg-[#0c0c0e] flex-grow">
            <div class="max-w-7xl mx-auto">
                <div id="setup-sheet-container" class="module-card p-8">
                    <div class="flex justify-between border-b border-zinc-800 pb-4 mb-8 italic uppercase font-black">
                        <h3 class="text-xl font-black text-white">Setup_Sheet_Log</h3>
                        <div class="flex gap-4">
                            <button id="btn-print" class="text-[10px] font-mono text-primary font-bold uppercase tracking-widest">Print_Report</button>
                            <button id="btn-clear" class="text-[10px] font-mono text-zinc-600 font-bold uppercase tracking-widest hover:text-red-500 transition-colors">Wipe_All</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto tabular-nums text-xs">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b border-zinc-800 text-zinc-500 uppercase font-black tracking-widest">
                                    <th class="p-4">T#</th><th class="p-4">Værktøj</th><th class="p-4">Operation</th><th class="p-4">RPM</th><th class="p-4">Vf</th><th class="p-4 text-right print:hidden">Action</th>
                                </tr>
                            </thead>
                            <tbody id="setup-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="shared_core.js"></script>
    <script src="hub.js"></script>
</body>
</html>
