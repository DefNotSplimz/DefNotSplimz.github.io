<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>CNC_HUB // OMEGA_PRIME_2050</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="sys-bar">
    <div>SYS.STATUS: OMEGA_ACTIVE</div>
    <div>CNC_HUB_CORE // V.2.0 // MODULAR_SPA</div>
  </div>
  <nav>
    <div class="brand"><h1>HUB_PRO</h1><span class="brand-sub">/// MACHINING INTERFACE</span></div>
    <div class="nav-links">
      <button class="nav-btn active" data-module="machining">Skæredata_</button>
      <button class="nav-btn" data-module="threading">Gevind.Tap_</button>
      <button class="nav-btn" data-module="tolerances">ISO.Pasning_</button>
      <button class="nav-btn" data-module="surface">Topografi.Ra_</button>
      <button class="nav-btn" data-module="pcd">PCD.Hulcirkel_</button>
      <button class="nav-btn" data-module="trig">Trigonometri_</button>
      <button class="nav-btn" data-module="codes">G/M_Koder_</button>
      <button class="nav-btn" data-module="logistics">Logistik_</button>
    </div>
    <div class="terminal-out" id="sys-log"><br>> SYSTEM_READY_</div>
  </nav>
  <main id="viewport"><div class="hud-panel" style="text-align:center; padding:100px">Henter moduler...</div></main>
  <script>
    const viewport = document.getElementById('viewport');
    const log = document.getElementById('sys-log');
    async function loadModule(name) {
      log.innerHTML += `<br>> LOADING: ${name.toUpperCase()}...`;
      try {
        const response = await fetch(`modules/${name}.html`);
        if (!response.ok) throw new Error();
        viewport.innerHTML = await response.text();
        const scripts = viewport.getElementsByTagName('script');
        for (let s of scripts) {
          const ns = document.createElement('script');
          ns.textContent = s.textContent;
          document.body.appendChild(ns).parentNode.removeChild(ns);
        }
        log.innerHTML += ` [OK]`;
      } catch (e) { viewport.innerHTML = `<h2>Fejl 404</h2>`; log.innerHTML += ` [FAIL]`; }
    }
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadModule(btn.dataset.module);
      });
    });
    window.onload = () => loadModule('machining');
  </script>
</body>
</html>
