<!DOCTYPE html>
<html lang="da" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Datum Prototyping | Setup Sheet Builder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: "#ec4899" }, 
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

</head>
<body class="bg-[#09090b] text-zinc-100 font-sans antialiased subtle-grid selection:bg-primary selection:text-white min-h-screen flex flex-col p-6">

    <div class="max-w-6xl mx-auto w-full">
        <header class="mb-8 border-b border-zinc-800 pb-6 flex flex-col lg:flex-row lg:justify-between lg:items-end gap-6 no-print">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase italic text-white">Setup <span class="text-zinc-600">&</span> Tools</h1>
                <div class="text-[10px] font-mono text-primary tracking-[0.4em] uppercase font-bold mt-2 mb-6">Datum Prototyping // Setup_Rev03</div>
                <div class="flex gap-4">
                    <a href="hub.html" class="inline-flex items-center justify-center px-6 py-2.5 text-[10px] font-mono font-bold uppercase tracking-widest border border-zinc-800 bg-[#0c0c0e] text-zinc-500 hover:text-white hover:border-zinc-600 transition-colors">
                        ← Return_To_Hub
                    </a>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <div class="flex bg-black/50 border border-zinc-800 p-1">
                    <button id="tab-cnc" onclick="setMachType('cnc')" class="w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest bg-primary text-white transition-colors">CNC</button>
                    <button id="tab-man" onclick="setMachType('man')" class="w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest text-zinc-500 hover:text-white transition-colors">Manuelt</button>
                </div>
                <div class="flex bg-black/50 border border-zinc-800 p-1">
                    <button id="tab-mill" onclick="setProcType('mill')" class="w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest bg-primary text-white transition-colors">Fræsning</button>
                    <button id="tab-lathe" onclick="setProcType('lathe')" class="w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest text-zinc-500 hover:text-white transition-colors">Drejning</button>
                </div>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 flex flex-col gap-8">
                
                <div id="setup-section" class="bg-black/40 border border-zinc-900 p-6">
                    <div class="section-header mt-0">// 01_SETUP_DATA</div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="label-text">Delnavn / Ordrenummer</label>
                            <input type="text" id="set-name" class="input-field border-zinc-600" placeholder="F.eks. Manifold Rev 3">
                        </div>
                        <div>
                            <label class="label-text">Maskine</label>
                            <input type="text" id="set-mach" class="input-field text-primary" placeholder="F.eks. Haas Mini Mill">
                        </div>
                        <div>
                            <label id="lbl-zero" class="label-text text-primary">Nulpunkt / WCS</label>
                            <input type="text" id="set-zero" class="input-field border-primary font-bold" placeholder="F.eks. G54">
                        </div>
                        
                        <div class="col-span-2 mt-2 border-t border-zinc-800 pt-4 no-print"></div>

                        <div class="col-span-2">
                            <label class="label-text">Råmål (Stock Geometry)</label>
                            <input type="text" id="set-stock" class="input-field" placeholder="F.eks. 100x100x50 mm blok">
                        </div>
                        <div>
                            <label class="label-text">Opspænding</label>
                            <input type="text" id="set-hold" class="input-field" placeholder="F.eks. Skruestik">
                        </div>
                        <div>
                            <label class="label-text text-primary">Emneudhæng (Z)</label>
                            <input type="text" id="set-stickout" class="input-field border-primary font-bold" placeholder="F.eks. 35 mm">
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">Kritiske Noter / Opspændings-instrukser</label>
                            <input type="text" id="set-notes" class="input-field text-zinc-400" placeholder="F.eks. Land i venstre side. Max 20 Nm.">
                        </div>
                    </div>
                </div>

                <div id="tool-input-section" class="bg-black/40 border border-zinc-900 p-6 flex-grow no-print">
                    <div class="section-header mt-0">// 02_TILFØJ_VÆRKTØJ</div>
                    
                    <div id="form-mill" class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="lbl-mill-id" class="label-text text-primary">T-Nummer</label>
                            <input type="text" id="mill-id" class="input-field border-primary font-bold" placeholder="T1">
                        </div>
                        <div>
                            <label class="label-text">Værktøjstype</label>
                            <select id="mill-type" class="input-field border-zinc-600">
                                <option>Pindfræser (Flat)</option>
                                <option>Planfræser (Face)</option>
                                <option>Kuglefræser (Ball)</option>
                                <option>Fasefræser (Chamfer)</option>
                                <option>Spiralbor</option>
                                <option>Centerbor</option>
                                <option>Gevindtap</option>
                                <option>Gevindfræser</option>
                                <option>Brotsjer (Reamer)</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Diameter (Ø) [mm]</label>
                            <input type="number" id="mill-d" class="input-field" placeholder="10">
                        </div>
                        <div>
                            <label class="label-text">Antal Skær (Z)</label>
                            <input type="number" id="mill-z" class="input-field" placeholder="3">
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">Frit Udhæng (L) [mm]</label>
                            <input type="number" id="mill-l" class="input-field" placeholder="35">
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">Noter / Holder</label>
                            <input type="text" id="mill-notes" class="input-field text-zinc-400" placeholder="F.eks. ER32 / HM Alu">
                        </div>
                    </div>

                    <div id="form-lathe" class="grid grid-cols-2 gap-4 hidden">
                        <div>
                            <label id="lbl-lathe-id" class="label-text text-primary">Tool ID / Offset</label>
                            <input type="text" id="lathe-id" class="input-field border-primary font-bold" placeholder="T0101">
                        </div>
                        <div>
                            <label class="label-text">Operationstype</label>
                            <select id="lathe-type" class="input-field border-zinc-600">
                                <option>Udvendig Skrub</option>
                                <option>Udvendig Slet</option>
                                <option>Indvendig Udboring</option>
                                <option>Spor / Afstik</option>
                                <option>Gevindstål (Udv)</option>
                                <option>Gevindstål (Indv)</option>
                                <option>Bor (Centerlinje)</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-text">Næseradius/Bredde [mm]</label>
                            <input type="number" id="lathe-re" class="input-field" placeholder="0.8" step="0.1">
                        </div>
                        <div>
                            <label class="label-text">Udhæng (L) [mm]</label>
                            <input type="number" id="lathe-l" class="input-field" placeholder="50">
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">Plattebetegnelse / Noter</label>
                            <input type="text" id="lathe-notes" class="input-field text-zinc-400" placeholder="F.eks. CNMG 120408">
                        </div>
                    </div>

                    <button onclick="addTool()" class="w-full mt-6 border border-primary bg-primary/10 hover:bg-primary text-primary hover:text-white text-[10px] uppercase font-bold tracking-widest py-3 transition-colors italic">
                        + Tilføj til Liste
                    </button>
                </div>
            </div>

            <div id="table-container" class="lg:col-span-2 bg-black/40 border border-zinc-900 p-6 flex flex-col">
                <div class="flex justify-between items-end mb-6 no-print">
                    <div class="section-header mt-0 mb-0">// 02_VÆRKTØJSLISTE</div>
                    <button onclick="clearTools()" class="text-[9px] font-mono font-bold text-red-500 hover:text-red-400 uppercase tracking-widest transition-colors">
                        [ Ryd Liste ]
                    </button>
                </div>
                
                <div class="section-header mt-0 mb-4 hidden print:block">// 02_VÆRKTØJSLISTE</div>

                <div class="flex-grow overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="table-head" class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest border-b border-zinc-800">
                        </thead>
                        <tbody id="table-body" class="text-sm font-mono">
                        </tbody>
                    </table>
                    
                    <div id="empty-state" class="text-center py-12 text-zinc-600 font-mono text-xs uppercase tracking-widest italic no-print">
                        Listen er tom. Tilføj udstyr via formularen.
                    </div>
                </div>

                <button onclick="window.print()" class="no-print w-full mt-8 border border-zinc-700 bg-zinc-900/50 hover:border-white hover:bg-white/10 text-white text-[10px] uppercase font-bold tracking-widest py-4 transition-colors italic">
                    Generér & Print Setup Sheet
                </button>
            </div>

        </div>
    </div>
    <script src="database.js"></script>
    <script>
        let machType = 'cnc'; 
        let procType = 'mill'; 
        
        let db = {
            cnc_mill: JSON.parse(localStorage.getItem('datum_cnc_mill')) || [],
            cnc_lathe: JSON.parse(localStorage.getItem('datum_cnc_lathe')) || [],
            man_mill: JSON.parse(localStorage.getItem('datum_man_mill')) || [],
            man_lathe: JSON.parse(localStorage.getItem('datum_man_lathe')) || []
        };

        const setupInputs = ['name', 'mach', 'zero', 'stock', 'hold', 'stickout', 'notes'];
        
        setupInputs.forEach(id => {
            const el = document.getElementById('set-' + id);
            el.value = localStorage.getItem('datum_set_' + id) || '';
            el.addEventListener('input', (e) => {
                localStorage.setItem('datum_set_' + id, e.target.value);
            });
        });

        function setMachType(type) {
            machType = type;
            const btnCnc = document.getElementById('tab-cnc');
            const btnMan = document.getElementById('tab-man');
            const activeCls = "w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest bg-primary text-white transition-colors";
            const inactiveCls = "w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest text-zinc-500 hover:text-white transition-colors";
            
            if (type === 'cnc') {
                btnCnc.className = activeCls;
                btnMan.className = inactiveCls;
            } else {
                btnMan.className = activeCls;
                btnCnc.className = inactiveCls;
            }
            updateFormLabels();
            renderTable();
        }

        function setProcType(type) {
            procType = type;
            const btnMill = document.getElementById('tab-mill');
            const btnLathe = document.getElementById('tab-lathe');
            const activeCls = "w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest bg-primary text-white transition-colors";
            const inactiveCls = "w-full px-8 py-2 text-xs font-mono font-bold uppercase italic tracking-widest text-zinc-500 hover:text-white transition-colors";
            
            if (type === 'mill') {
                btnMill.className = activeCls;
                btnLathe.className = inactiveCls;
                document.getElementById('form-mill').classList.remove('hidden');
                document.getElementById('form-lathe').classList.add('hidden');
            } else {
                btnLathe.className = activeCls;
                btnMill.className = inactiveCls;
                document.getElementById('form-lathe').classList.remove('hidden');
                document.getElementById('form-mill').classList.add('hidden');
            }
            updateFormLabels();
            renderTable();
        }

        function updateFormLabels() {
            const lblZero = document.getElementById('lbl-zero');
            const lblMillId = document.getElementById('lbl-mill-id');
            const lblLatheId = document.getElementById('lbl-lathe-id');
            
            const inMillId = document.getElementById('mill-id');
            const inLatheId = document.getElementById('lathe-id');
            const inZero = document.getElementById('set-zero');

            if (machType === 'cnc') {
                lblZero.innerText = "Nulpunkt / WCS";
                inZero.placeholder = "F.eks. G54";
                lblMillId.innerText = "T-Nummer";
                inMillId.placeholder = "T1";
                lblLatheId.innerText = "Tool / Offset";
                inLatheId.placeholder = "T0101";
            } else {
                lblZero.innerText = "DRO Reference";
                inZero.placeholder = "F.eks. X/Y Center";
                lblMillId.innerText = "Operation #";
                inMillId.placeholder = "Op 1";
                lblLatheId.innerText = "Operation #";
                inLatheId.placeholder = "Op 1";
            }
        }

        function getCurrentListKey() {
            return `${machType}_${procType}`;
        }

        function addTool() {
            const listKey = getCurrentListKey();
            let tool = {};

            if (procType === 'mill') {
                tool = {
                    id: document.getElementById('mill-id').value || '-',
                    type: document.getElementById('mill-type').value,
                    d: document.getElementById('mill-d').value || '-',
                    z: document.getElementById('mill-z').value || '-',
                    l: document.getElementById('mill-l').value || '-',
                    notes: document.getElementById('mill-notes').value || '-'
                };
                document.getElementById('mill-id').value = '';
                document.getElementById('mill-d').value = '';
                document.getElementById('mill-z').value = '';
                document.getElementById('mill-l').value = '';
                document.getElementById('mill-notes').value = '';
                document.getElementById('mill-id').focus();
            } else {
                tool = {
                    id: document.getElementById('lathe-id').value || '-',
                    type: document.getElementById('lathe-type').value,
                    re: document.getElementById('lathe-re').value || '-',
                    l: document.getElementById('lathe-l').value || '-',
                    notes: document.getElementById('lathe-notes').value || '-'
                };
                document.getElementById('lathe-id').value = '';
                document.getElementById('lathe-re').value = '';
                document.getElementById('lathe-l').value = '';
                document.getElementById('lathe-notes').value = '';
                document.getElementById('lathe-id').focus();
            }

            db[listKey].push(tool);
            localStorage.setItem(`datum_${listKey}`, JSON.stringify(db[listKey]));
            renderTable();
        }

        function deleteTool(index) {
            const listKey = getCurrentListKey();
            db[listKey].splice(index, 1);
            localStorage.setItem(`datum_${listKey}`, JSON.stringify(db[listKey]));
            renderTable();
        }

        function clearTools() {
            const listKey = getCurrentListKey();
            if (confirm(`Slet hele listen for ${machType.toUpperCase()} ${procType === 'mill' ? 'Fræsning' : 'Drejning'}?`)) {
                db[listKey] = [];
                localStorage.setItem(`datum_${listKey}`, JSON.stringify(db[listKey]));
                renderTable();
            }
        }

        function renderTable() {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            const listKey = getCurrentListKey();
            const list = db[listKey];

            if (list.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            const headerId = machType === 'cnc' ? (procType === 'mill' ? 'T-Num' : 'Offset') : 'Op #';

            if (procType === 'mill') {
                thead.innerHTML = `
                    <tr>
                        <th class="pb-3 w-16">${headerId}</th>
                        <th class="pb-3">Type</th>
                        <th class="pb-3 text-center">Ø [mm]</th>
                        <th class="pb-3 text-center">Skær (Z)</th>
                        <th class="pb-3 text-center">Udhæng</th>
                        <th class="pb-3">Noter</th>
                        <th class="pb-3 text-right no-print">Slet</th>
                    </tr>
                `;
                list.forEach((t, i) => {
                    tbody.innerHTML += `
                        <tr class="border-b border-zinc-800/50 hover:bg-zinc-900/30 transition-colors">
                            <td class="py-3 text-primary font-bold">${t.id}</td>
                            <td class="py-3 text-zinc-300">${t.type}</td>
                            <td class="py-3 text-center text-white font-bold">${t.d}</td>
                            <td class="py-3 text-center text-white">${t.z}</td>
                            <td class="py-3 text-center text-white">${t.l}</td>
                            <td class="py-3 text-zinc-400 text-xs italic">${t.notes}</td>
                            <td class="py-3 text-right no-print">
                                <button onclick="deleteTool(${i})" class="text-zinc-600 hover:text-red-500 font-bold px-2">X</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                thead.innerHTML = `
                    <tr>
                        <th class="pb-3 w-20">${headerId}</th>
                        <th class="pb-3">Type</th>
                        <th class="pb-3 text-center">Re/Bredde</th>
                        <th class="pb-3 text-center">Udhæng</th>
                        <th class="pb-3">Noter</th>
                        <th class="pb-3 text-right no-print">Slet</th>
                    </tr>
                `;
                list.forEach((t, i) => {
                    tbody.innerHTML += `
                        <tr class="border-b border-zinc-800/50 hover:bg-zinc-900/30 transition-colors">
                            <td class="py-3 text-primary font-bold">${t.id}</td>
                            <td class="py-3 text-zinc-300">${t.type}</td>
                            <td class="py-3 text-center text-white font-bold">${t.re}</td>
                            <td class="py-3 text-center text-white">${t.l}</td>
                            <td class="py-3 text-zinc-400 text-xs italic">${t.notes}</td>
                            <td class="py-3 text-right no-print">
                                <button onclick="deleteTool(${i})" class="text-zinc-600 hover:text-red-500 font-bold px-2">X</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        setMachType('cnc');
        setProcType('mill');
    </script>
</body>
</html>
